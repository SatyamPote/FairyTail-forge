kind = "mobile"
previewPath = "/mobile/"
title = "FairyTail Forge Mobile"
version = "1.0.0"
id = "artifacts/fairytail-forge-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 21337

[services.development]
run = "pnpm --filter @workspace/fairytail-forge-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fairytail-forge-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/fairytail-forge-mobile", "run", "serve" ]

[services.env]
PORT = "21337"
BASE_PATH = "/mobile/"
